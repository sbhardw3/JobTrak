spring.application.name=backend

spring.datasource.url=jdbc:postgresql://localhost:5432/jobtrak_db
spring.datasource.username=postgres
spring.datasource.password=jobtrak123

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.jwt.secret=${JWT_SECRET:jobtrak-development-secret-key-change-before-production-1234567890}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.openai.api-key=${OPENAI_API_KEY:}
app.openai.model=${OPENAI_MODEL:gpt-4o-mini}
