spring.application.name=backend
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]

spring.datasource.url=jdbc:postgresql://localhost:5432/jobtrak_db
spring.datasource.username=postgres
spring.datasource.password=jobtrak123

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

app.jwt.secret=${JWT_SECRET:jobtrak-development-secret-key-change-before-production-1234567890}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
app.gemini.fallback-model=${GEMINI_FALLBACK_MODEL:gemini-2.5-flash-lite}
