name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: jobtrak_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: jobtrak123
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d jobtrak_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/jobtrak_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: jobtrak123
      SPRING_JPA_SHOW_SQL: "false"
      JWT_SECRET: jobtrak-ci-secret-key-change-before-production-1234567890

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run backend tests
        run: mvn -B test

  frontend:
    name: Frontend Lint And Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create Docker env file
        run: cp .env.example .env

      - name: Validate Compose file
        run: docker compose config --quiet

      - name: Build Docker images
        run: docker compose build
