services:
  postgres:
    image: postgres:17-alpine
    container_name: jobtrak-postgres
    environment:
      POSTGRES_DB: jobtrak_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: jobtrak123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jobtrak_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: jobtrak-backend
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/jobtrak_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: jobtrak123
      SPRING_JPA_SHOW_SQL: "false"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ""
    container_name: jobtrak-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
